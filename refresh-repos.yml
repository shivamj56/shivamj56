# =================================================================
#  Auto-refresh the REPOSITORIES section of README.md
#  Drop this file into:  .github/workflows/refresh-repos.yml
#  inside your profile repo (github.com/shivamj56/shivamj56).
#
#  It runs every 6 hours (and on every push to main / manual trigger),
#  fetches all your public repos, and rewrites the block between
#  <!-- REPOS:START --> and <!-- REPOS:END --> markers in README.md.
# =================================================================

name: Refresh Repositories Section

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # manual trigger button
  push:
    branches: [main]
    paths:
      - ".github/workflows/refresh-repos.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild repos block
        env:
          GH_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > update.mjs <<'JS'
          import fs from "node:fs";

          const user  = process.env.GH_USER;
          const token = process.env.GITHUB_TOKEN;

          const headers = {
            "User-Agent": "readme-refresh-action",
            "Accept": "application/vnd.github+json",
            ...(token && { "Authorization": `Bearer ${token}` }),
          };

          // -------- fetch ALL public, non-fork, non-archived repos
          const all = [];
          for (let page = 1; page < 20; page++) {
            const url  = `https://api.github.com/users/${user}/repos?per_page=100&sort=updated&page=${page}`;
            const res  = await fetch(url, { headers });
            if (!res.ok) throw new Error(`GitHub API ${res.status}: ${await res.text()}`);
            const list = await res.json();
            if (list.length === 0) break;
            all.push(...list);
            if (list.length < 100) break;
          }

          const repos = all
            .filter(r => !r.fork && !r.archived && !r.private)
            .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

          // -------- neon palette, rotated across cards
          const palette = ["ADC6FF", "E9B3FF", "74D1FF", "ADC6FF"];
          const pinCard = (r, color) => {
            const home = r.homepage && r.homepage.trim()
              ? `<br/><a href="${r.homepage}"><img src="https://img.shields.io/badge/%E2%86%97%20LIVE%20DEMO-10131B?style=flat-square&logo=vercel&logoColor=ADC6FF&labelColor=10131B" alt="live"/></a>`
              : "";
            const desc = (r.description || "No description set.")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            return `<td width="50%" valign="top">
            <a href="${r.html_url}">
              <img src="https://github-readme-stats.vercel.app/api/pin/?username=${user}&repo=${r.name}&theme=tokyonight&bg_color=10131B&title_color=${color}&icon_color=${color}&text_color=C1C6D7&border_color=414755" alt="${r.name}"/>
            </a>
            <p align="center"><sub>${desc}</sub>${home}</p>
          </td>`;
          };

          // -------- build a 2-column grid
          let rows = "";
          for (let i = 0; i < repos.length; i += 2) {
            rows += "<tr>\n";
            rows += pinCard(repos[i], palette[i % palette.length]) + "\n";
            if (repos[i + 1]) rows += pinCard(repos[i + 1], palette[(i + 1) % palette.length]) + "\n";
            rows += "</tr>\n";
          }

          const block = `<!-- REPOS:START -->
          <!-- Auto-generated by .github/workflows/refresh-repos.yml — every 6 hours. -->
          <!-- DO NOT edit by hand; edits between these markers will be overwritten. -->
          <table>
          ${rows}</table>
          <!-- REPOS:END -->`;

          const readme  = fs.readFileSync("README.md", "utf8");
          const updated = readme.replace(
            /<!-- REPOS:START -->[\s\S]*?<!-- REPOS:END -->/,
            block,
          );

          if (updated === readme) {
            console.log("No change — repos block already up to date.");
          } else {
            fs.writeFileSync("README.md", updated);
            console.log(`Refreshed with ${repos.length} repositories.`);
          }
          JS
          node update.mjs

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(readme): refresh repositories section"
            git push
          fi
