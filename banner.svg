<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="Creative Technologist banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="55%" stop-color="#101012"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cfa572"/>
      <stop offset="50%" stop-color="#e8d3ab"/>
      <stop offset="100%" stop-color="#cfa572"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfa572" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#cfa572" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="0.4"/></filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- ambient glow -->
  <ellipse cx="940" cy="160" rx="360" ry="240" fill="url(#glow)"/>

  <!-- orbiting geometry -->
  <g transform="translate(960,160)">
    <circle r="96" fill="none" stroke="#cfa572" stroke-opacity="0.22" stroke-width="1"/>
    <circle r="68" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <g>
      <circle cx="96" cy="0" r="3.5" fill="url(#gold)"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </g>
    <g>
      <circle cx="0" cy="-68" r="2.5" fill="#e8d3ab" opacity="0.7"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </g>
    <circle r="5" fill="url(#gold)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating particles -->
  <g fill="#cfa572">
    <circle cx="180" cy="70" r="1.6" opacity="0.5">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="230" r="1.4" opacity="0.4">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="250" r="1.5" opacity="0.4">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="60" r="1.3" opacity="0.5">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- accent rule -->
  <rect x="90" y="118" width="46" height="3" rx="1.5" fill="url(#gold)"/>

  <!-- eyebrow -->
  <text x="90" y="100" font-family="'Courier New', monospace" font-size="14" letter-spacing="6"
        fill="#cfa572" fill-opacity="0.85">PORTFOLIO · 2026</text>

  <!-- headline -->
  <text x="88" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="62"
        font-weight="700" fill="#f4f1ea" filter="url(#soft)">Creative Technologist</text>

  <!-- subline -->
  <text x="90" y="222" font-family="'Helvetica Neue', Arial, sans-serif" font-size="19"
        letter-spacing="0.5" fill="#9a958c">
    Websites · Chrome Extensions · AI Agents · Brand &amp; Motion
  </text>

  <!-- status pill -->
  <g transform="translate(90,250)">
    <rect width="186" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="#cfa572" stroke-opacity="0.4"/>
    <circle cx="22" cy="17" r="5" fill="#7bd88f">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13"
          letter-spacing="1.5" fill="#d9d5cc">AVAILABLE FOR WORK</text>
  </g>

  <!-- frame -->
  <rect x="6" y="6" width="1188" height="308" rx="8" fill="none"
        stroke="#cfa572" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
