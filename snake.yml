# =================================================================
#  Generate the snake contribution graph (used in README footer)
#  Drop this file into:  .github/workflows/snake.yml
#  inside your profile repo (github.com/shivamj56/shivamj56).
#
#  Publishes two SVGs to the `output` branch:
#    - github-contribution-grid-snake.svg       (light theme)
#    - github-contribution-grid-snake-dark.svg  (dark, neon palette)
#  The README's <picture> block loads the right one automatically.
# =================================================================

name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23adc6ff&color_dots=%23272a32,%234b8eff,%23adc6ff,%23e9b3ff,%2374d1ff

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
